name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod

permissions:
  contents: read

jobs:
  apply:
    name: Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prod' && 'prod' || inputs.environment }}

    defaults:
      run:
        working-directory: Task1Advanced/envs/${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0

      - name: Terraform Init
        run: tofu init -input=false

      - name: Terraform Plan
        run: tofu plan -input=false -no-color -out=tfplan

      - name: Terraform Apply
        run: tofu apply -input=false -auto-approve tfplan

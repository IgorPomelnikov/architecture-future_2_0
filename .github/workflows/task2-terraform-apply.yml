name: Task2 Terraform (apply)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod

permissions:
  contents: read

jobs:
  apply:
    name: "apply — ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prod' && 'prod' || inputs.environment }}

    defaults:
      run:
        working-directory: Task2Advanced/envs/${{ inputs.environment }}

    services:
      minio:
        image: bitnami/minio:2024.12.18
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: terraform-state
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TF_IN_AUTOMATION: true
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_ENDPOINT: ${{ secrets.TF_STATE_ENDPOINT }}
      TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0

      - name: Prepare MinIO bucket
        working-directory: Task2Advanced
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc
          chmod +x /tmp/mc
          /tmp/mc alias set ci http://127.0.0.1:9000 minioadmin minioadmin
          /tmp/mc mb ci/terraform-state --ignore-existing

      - name: Write backend config
        run: |
          BUCKET="${TF_STATE_BUCKET:-terraform-state}"
          ENDPOINT="${TF_STATE_ENDPOINT:-http://127.0.0.1:9000}"
          REGION="${TF_STATE_REGION:-us-east-1}"
          ACCESS_KEY="${AWS_ACCESS_KEY_ID:-minioadmin}"
          SECRET_KEY="${AWS_SECRET_ACCESS_KEY:-minioadmin}"
          {
            echo "bucket                      = \"${BUCKET}\""
            echo "key                         = \"task2advanced/${{ inputs.environment }}/terraform.tfstate\""
            echo "region                      = \"${REGION}\""
            echo "endpoint                    = \"${ENDPOINT}\""
            echo "access_key                  = \"${ACCESS_KEY}\""
            echo "secret_key                  = \"${SECRET_KEY}\""
            echo "skip_credentials_validation = true"
            echo "skip_metadata_api_check     = true"
            echo "skip_region_validation      = true"
            echo "skip_requesting_account_id  = true"
            echo "use_path_style              = true"
          } > backend.ci.hcl

      - name: Terraform init
        run: tofu init -input=false -backend-config=backend.ci.hcl

      - name: Terraform plan
        run: tofu plan -input=false -no-color -out=tfplan

      - name: Terraform apply
        run: tofu apply -input=false -auto-approve tfplan

      - name: Terraform outputs
        run: tofu output -no-color
